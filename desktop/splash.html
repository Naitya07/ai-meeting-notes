<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MeetingMind — Starting…</title>
  <style>
    /* ------------------------------------------------------------------ */
    /* Reset & base                                                          */
    /* ------------------------------------------------------------------ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #09090F;
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #E2E8F0;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      /* Allow the frameless window to be dragged by the splash */
      -webkit-app-region: drag;
    }

    /* ------------------------------------------------------------------ */
    /* Subtle animated background gradient                                   */
    /* ------------------------------------------------------------------ */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 30%, rgba(124, 58, 237, 0.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 70%, rgba(109, 40, 217, 0.12) 0%, transparent 70%);
      animation: bgShift 6s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes bgShift {
      from { opacity: 0.6; }
      to   { opacity: 1;   }
    }

    /* ------------------------------------------------------------------ */
    /* Layout                                                               */
    /* ------------------------------------------------------------------ */
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 28px;
      position: relative;
      z-index: 1;
    }

    /* ------------------------------------------------------------------ */
    /* Logo area                                                            */
    /* ------------------------------------------------------------------ */
    .logo-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brain-icon {
      font-size: 52px;
      line-height: 1;
      filter: drop-shadow(0 0 18px rgba(139, 92, 246, 0.7));
      animation: iconPulse 2.4s ease-in-out infinite;
    }

    @keyframes iconPulse {
      0%, 100% { filter: drop-shadow(0 0 18px rgba(139, 92, 246, 0.7)); transform: scale(1);   }
      50%       { filter: drop-shadow(0 0 30px rgba(167, 139, 250, 0.9)); transform: scale(1.06); }
    }

    .app-name {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #A78BFA 0%, #7C3AED 50%, #C4B5FD 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ------------------------------------------------------------------ */
    /* Tagline                                                              */
    /* ------------------------------------------------------------------ */
    .tagline {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6B7280;
    }

    /* ------------------------------------------------------------------ */
    /* Spinner                                                              */
    /* ------------------------------------------------------------------ */
    .spinner-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-top: 8px;
    }

    .spinner {
      position: relative;
      width: 48px;
      height: 48px;
    }

    /* Outer rotating ring */
    .spinner::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 3px solid rgba(124, 58, 237, 0.15);
      border-top-color: #7C3AED;
      animation: spin 0.9s linear infinite;
    }

    /* Inner pulsing dot */
    .spinner::after {
      content: '';
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      background: rgba(139, 92, 246, 0.25);
      animation: innerPulse 0.9s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes innerPulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50%       { opacity: 0.9; transform: scale(1.1); }
    }

    /* ------------------------------------------------------------------ */
    /* Status text                                                          */
    /* ------------------------------------------------------------------ */
    .status {
      font-size: 13px;
      font-weight: 500;
      color: #9CA3AF;
      letter-spacing: 0.03em;
      animation: statusFade 2s ease-in-out infinite alternate;
    }

    @keyframes statusFade {
      from { opacity: 0.6; }
      to   { opacity: 1;   }
    }

    /* ------------------------------------------------------------------ */
    /* Version badge                                                        */
    /* ------------------------------------------------------------------ */
    .version {
      position: fixed;
      bottom: 18px;
      right: 20px;
      font-size: 11px;
      color: #374151;
      letter-spacing: 0.04em;
    }

    /* ------------------------------------------------------------------ */
    /* Progress bar                                                         */
    /* ------------------------------------------------------------------ */
    .progress-track {
      width: 220px;
      height: 3px;
      background: rgba(124, 58, 237, 0.12);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, #7C3AED, #A78BFA);
      border-radius: 99px;
      animation: progressSlide 1.6s ease-in-out infinite;
      transform-origin: left center;
    }

    @keyframes progressSlide {
      0%   { transform: translateX(-100%); width: 40%; }
      50%  { width: 60%; }
      100% { transform: translateX(350%);  width: 40%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-row">
      <span class="brain-icon">🧠</span>
      <span class="app-name">MeetingMind</span>
    </div>

    <p class="tagline">Edge-Native AI Meeting Intelligence</p>

    <div class="spinner-wrap">
      <div class="spinner"></div>
      <p class="status">Starting AI Engine&hellip;</p>
      <div class="progress-track">
        <div class="progress-fill"></div>
      </div>
    </div>
  </div>

  <span class="version">v2.0.0</span>
</body>
</html>
